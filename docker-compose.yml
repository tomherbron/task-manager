services:
  backend:
    image: tomherbron/tom-devsecops:backend
    ports:
      - "8000:8000"
    environment:
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
    restart: unless-stopped

  frontend:
    image: tomherbron/tom-devsecops:frontend
    ports:
      - "3000:80"
    environment:
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
    depends_on:
      - backend
